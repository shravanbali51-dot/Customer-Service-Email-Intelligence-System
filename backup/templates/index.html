<!DOCTYPE html>
<html>
<head>
    <title>Email Intelligence</title>

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
            background: linear-gradient(120deg, #eef2ff, #f8fafc);
        }

        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 520px;
            background: white;
            padding: 40px;
            border-radius: 18px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.12);
            border: 1px solid #eee;
        }

        h1 {
            margin-bottom: 25px;
            font-size: 26px;
            font-weight: 700;
            color: #111827;
            text-align: center;
        }

        label {
            font-size: 13px;
            color: #6b7280;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            font-size: 14px;
            background: #f9fafb;
            transition: 0.25s;
        }

        input:focus, textarea:focus {
            border-color: #6366f1;
            background: white;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
            outline: none;
        }

        button {
            width: 100%;
            padding: 13px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79,70,229,0.3);
        }

        .footer {
            text-align: center;
            margin-top: 25px;
        }

        .footer a {
            text-decoration: none;
            color: #4f46e5;
            font-size: 14px;
            font-weight: 500;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="wrapper">
    <div class="card">

        <h1>📧 Email Intelligence System</h1>

        <form method="POST">

            <label>Subject</label>
            <input type="text" name="subject" placeholder="Enter email subject..." required>

            <label>Email Content</label>
            <textarea name="content" rows="5" placeholder="Write customer email here..." required></textarea>

            <button type="submit">Analyze Email</button>

        </form>

        <div class="footer">
            <a href="/login">Admin Login</a>
        </div>

    </div>
</div>

</body>
</html>

{% extends "base.html" %}
{% block title %}User Signup{% endblock %}
{% block body %}
<main class="auth-shell">
  <a href="{{ url_for('main.index') }}" class="auth-back"><i class="bi bi-arrow-left"></i> Home</a>
  <section class="auth-panel">
    <div class="auth-heading">
      <span class="brand-mark mx-auto"><i class="bi bi-person-plus"></i></span>
      <h1>Create User Account</h1>
      <p>Sign up to submit and track your support queries.</p>
    </div>
    <form method="post" class="stack-form">
      <label>Full Name</label>
      <input class="form-control" name="full_name" required>
      <label>Email</label>
      <input class="form-control" type="email" name="email" required>
      <label>Password</label>
      <input class="form-control" type="password" name="password" required>
      <label>Confirm Password</label>
      <input class="form-control" type="password" name="confirm_password" required>
      <small class="text-muted">Use uppercase, lowercase, number, special character, and at least 8 characters.</small>
      <button class="btn btn-primary w-100" type="submit">Sign Up</button>
    </form>
  </section>
</main>
{% endblock %}

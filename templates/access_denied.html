{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block body %}
<main class="auth-shell">
  <section class="auth-panel text-center">
    <span class="brand-mark mx-auto"><i class="bi bi-shield-x"></i></span>
    <h1 class="mt-3">Access Denied</h1>
    <p>{{ message or "You are not authorized to access this page." }}</p>
    <a class="btn btn-primary" href="{{ url_for('main.index') }}">Go Home</a>
  </section>
</main>
{% endblock %}

{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block body %}
<main class="auth-shell">
  <a href="{{ url_for('main.index') }}" class="auth-back"><i class="bi bi-arrow-left"></i> Home</a>
  <section class="auth-panel">
    <div class="auth-heading">
      <span class="brand-mark mx-auto"><i class="bi bi-shield-lock"></i></span>
      <h1>Admin Login</h1>
      <p>Restricted access for the predefined administrator account only.</p>
    </div>
    <form method="post" class="stack-form">
      <label>Admin Username</label>
      <input class="form-control" name="username" autocomplete="username" required>
      <label>Password</label>
      <input class="form-control" type="password" name="password" autocomplete="current-password" required>
      <button class="btn btn-primary w-100" type="submit">Login as Admin</button>
    </form>
  </section>
</main>
{% endblock %}
